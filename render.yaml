services:
  - type: web
    name: neuramed-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
